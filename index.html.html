<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Study Diary</title>
  <!-- 배포용 버전: 개인 기록은 포함되어 있지 않습니다. -->

  <style>
    :root {
      --cream: #fffdf0;
      --soft-yellow: #fff2aa;
      --light-yellow: #fff9d7;
      --soft-green: #dff3d8;
      --mint: #c9e9c6;
      --main-green: #78ad7e;
      --deep-green: #486d50;
      --ink: #35433a;
      --muted: #718076;
      --white: #ffffff;
      --danger: #df7770;
      --line: #dce9d8;
      --shadow: 0 12px 30px rgba(91, 119, 84, 0.12);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 16px 50px;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 242, 170, 0.72), transparent 34%),
        radial-gradient(circle at top right, rgba(201, 233, 198, 0.72), transparent 31%),
        var(--cream);
    }

    button, input, textarea { font: inherit; }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      padding: 34px 30px;
      text-align: center;
      background: linear-gradient(135deg, #dff3d8 0%, #fff4b8 100%);
      border: 1px solid rgba(120, 173, 126, 0.2);
      border-radius: 26px;
      box-shadow: var(--shadow);
    }

    .hero::before,
    .hero::after {
      position: absolute;
      font-size: 4.8rem;
      opacity: 0.14;
      pointer-events: none;
    }

    .hero::before {
      content: "🌿";
      top: -12px;
      left: 18px;
      transform: rotate(-14deg);
    }

    .hero::after {
      content: "✨";
      right: 22px;
      bottom: -14px;
      transform: rotate(12deg);
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      color: var(--deep-green);
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: -0.03em;
    }

    .hero p {
      position: relative;
      z-index: 1;
      margin: 0;
      color: #5b6e60;
      line-height: 1.7;
    }

    .stats {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .stat-chip {
      padding: 9px 14px;
      color: var(--deep-green);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(120, 173, 126, 0.23);
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .card {
      margin-bottom: 22px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(120, 173, 126, 0.15);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 21px;
      color: var(--deep-green);
      font-size: 1.28rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #44604b;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      color: var(--ink);
      background: #fffef8;
      border: 1px solid #dce7d8;
      border-radius: 13px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    textarea {
      min-height: 102px;
      resize: vertical;
      line-height: 1.65;
    }

    input::placeholder,
    textarea::placeholder {
      color: #a1aaa4;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--main-green);
      box-shadow: 0 0 0 4px rgba(120, 173, 126, 0.16);
      transform: translateY(-1px);
    }

    .required { color: #cc665f; }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      min-height: 44px;
      padding: 11px 17px;
      border: 0;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 16px rgba(76, 105, 80, 0.14);
    }

    button:active {
      transform: translateY(0) scale(0.98);
    }

    .primary-btn {
      color: #fff;
      background: var(--main-green);
    }

    .secondary-btn {
      color: #5d6048;
      background: var(--soft-yellow);
    }

    .danger-btn {
      color: #fff;
      background: var(--danger);
    }

    .small-btn {
      min-height: 38px;
      padding: 8px 13px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .search-grid {
      display: grid;
      grid-template-columns: minmax(180px, 0.8fr) minmax(230px, 1.5fr);
      gap: 14px;
    }

    .help-text {
      margin: 12px 0 0;
      padding: 11px 13px;
      color: #6e785f;
      background: var(--light-yellow);
      border-radius: 11px;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    #listView {
      scroll-margin-top: 16px;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .list-header .card-title { margin: 0; }

    .result-count {
      padding: 7px 11px;
      color: var(--deep-green);
      background: var(--soft-green);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .diary-list {
      display: grid;
      gap: 20px;
    }

    .date-group {
      display: grid;
      gap: 12px;
    }

    .date-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 14px;
      color: var(--deep-green);
      background: linear-gradient(90deg, var(--soft-green), var(--light-yellow));
      border-radius: 13px;
      font-weight: 900;
    }

    .date-group-count {
      font-size: 0.87rem;
      font-weight: 700;
      color: #68715e;
    }

    .diary-item {
      position: relative;
      overflow: hidden;
      padding: 19px 19px 18px 24px;
      background: #fffef9;
      border: 1px solid #e4eadf;
      border-radius: 16px;
      box-shadow: 0 7px 18px rgba(90, 110, 83, 0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .diary-item::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: linear-gradient(var(--main-green), var(--soft-yellow));
    }

    .diary-item::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 48%;
      width: 70px;
      height: 16px;
      background: rgba(255, 236, 137, 0.36);
      transform: rotate(-2deg);
      pointer-events: none;
    }

    .diary-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 23px rgba(90, 110, 83, 0.12);
    }

    .diary-item-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .diary-date {
      margin-bottom: 7px;
      color: #6e8e72;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .diary-title {
      margin: 0;
      color: #344b39;
      font-size: 1.13rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .goal-snippet {
      position: relative;
      z-index: 1;
      margin: 13px 0 0;
      color: #68736b;
      font-size: 0.93rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .preview-block {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      padding: 12px;
      background: #f5faef;
      border: 1px solid #e2eddc;
      border-radius: 11px;
      line-height: 1.65;
      word-break: break-word;
    }

    .preview-label {
      display: block;
      margin-bottom: 5px;
      color: #56815e;
      font-size: 0.84rem;
      font-weight: 900;
    }

    mark {
      padding: 1px 4px;
      color: inherit;
      background: #ffe983;
      border-radius: 4px;
    }

    .empty-message {
      padding: 34px 14px;
      color: #778078;
      text-align: center;
      background: linear-gradient(135deg, #fbfff8, #fffbed);
      border: 1px dashed #bcd4b7;
      border-radius: 15px;
      line-height: 1.7;
    }

    .empty-icon {
      display: block;
      margin-bottom: 7px;
      font-size: 2rem;
    }

    .detail-view {
      display: none;
      animation: fadeUp 0.25s ease;
    }

    .detail-title {
      margin: 0 0 7px;
      color: var(--deep-green);
      word-break: break-word;
    }

    .detail-row {
      margin-bottom: 14px;
      padding: 16px;
      background: linear-gradient(135deg, #fbfff8, #fffcef);
      border: 1px solid #e2eadf;
      border-radius: 14px;
    }

    .detail-row:last-child { margin-bottom: 0; }

    .detail-row h3 {
      margin: 0 0 8px;
      color: #52745a;
      font-size: 1rem;
    }

    .detail-row p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.75;
      word-break: break-word;
    }

    .edit-notice {
      display: none;
      margin-bottom: 17px;
      padding: 12px 14px;
      color: #4e684f;
      background: var(--soft-green);
      border-radius: 11px;
      font-weight: 800;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }



    .calendar-section {
      margin-bottom: 20px;
      padding-bottom: 18px;
      border-bottom: 1px dashed var(--line);
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .calendar-title {
      margin: 0;
      color: var(--deep-green);
      font-size: 1rem;
      font-weight: 900;
    }

    .calendar-nav {
      min-width: 38px;
      min-height: 38px;
      padding: 6px;
      color: var(--deep-green);
      background: var(--light-yellow);
      border-radius: 10px;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .calendar-weekdays {
      margin-bottom: 5px;
      color: var(--muted);
      text-align: center;
      font-size: 0.75rem;
      font-weight: 800;
    }

    .calendar-day {
      position: relative;
      min-width: 0;
      min-height: 35px;
      padding: 6px 2px 10px;
      color: var(--ink);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: none;
    }

    .calendar-day:hover {
      transform: none;
      color: var(--deep-green);
      background: #f8fbe9;
      box-shadow: none;
    }

    .calendar-day.has-record {
      background: rgba(201, 233, 198, 0.48);
      border-color: rgba(120, 173, 126, 0.18);
    }

    .calendar-day.has-record::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 4px;
      height: 4px;
      background: #7fa985;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .calendar-day.today {
      border-color: rgba(216, 178, 75, 0.75);
    }

    .calendar-day.selected {
      color: var(--deep-green);
      background: rgba(255, 242, 170, 0.72);
      border-color: var(--main-green);
    }

    .calendar-day.other-month {
      color: #b8c0ba;
    }

    .calendar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 3px;
    }

    .legend-record {
      background: rgba(201, 233, 198, 0.75);
    }

    .legend-today {
      background: var(--light-yellow);
      border: 1px solid rgba(216, 178, 75, 0.75);
    }

    .autosave-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 24px;
      margin: -8px 0 10px;
    }

    .autosave-status {
      color: #708071;
      font-size: 0.84rem;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .calendar-day {
        min-height: 40px;
        font-size: 0.9rem;
      }
    }

    .app-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 16px;
      align-self: start;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 173, 126, 0.45) transparent;
    }

    .sidebar::-webkit-scrollbar {
      width: 7px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(120, 173, 126, 0.4);
      border-radius: 999px;
    }

    .sidebar .card {
      margin-bottom: 0;
    }

    .main-content {
      min-width: 0;
    }

    .backup-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed var(--line);
    }

    .backup-section h3 {
      margin: 0 0 12px;
      color: var(--deep-green);
      font-size: 1rem;
    }

    .file-input {
      display: none;
    }

    .status-message {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--light-yellow);
      color: #6d704f;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      .app-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 650px) {
      body { padding: 14px 10px 35px; }

      .hero {
        padding: 28px 18px;
        border-radius: 20px;
      }

      .hero::before,
      .hero::after {
        font-size: 3.6rem;
      }

      .card {
        padding: 18px 15px;
        border-radius: 17px;
      }

      .search-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .list-header,
      .diary-item-top,
      .date-group-header {
        align-items: stretch;
        flex-direction: column;
      }

      .button-group {
        display: grid;
        grid-template-columns: 1fr;
      }

      .button-group button,
      .diary-item-top button {
        width: 100%;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .diary-item {
        padding: 21px 15px 16px 20px;
      }

      .diary-item::after {
        left: 39%;
      }
    }

    @media (max-width: 380px) {
      .stats { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.85rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header class="hero">
      <h1>📚 My Study Diary</h1>
      <p>하루의 작은 배움을 차곡차곡 기록하는 나만의 성장 다이어리 🌱</p>
      <div class="stats" aria-label="학습 기록 통계">
        <span id="todayCount" class="stat-chip">☀️ 오늘의 기록 0개</span>
        <span id="totalCount" class="stat-chip">🗂️ 전체 기록 0개</span>
      </div>
    </header>

    <div class="app-layout">

    <!--
      최종 검수 완료 항목
      1. 같은 날짜에 여러 기록 저장
      2. 날짜/키워드/동시 검색
      3. 검색어 주변 미리보기와 강조
      4. 상세 보기/수정/개별 삭제/전체 삭제
      5. localStorage 저장
      6. 모바일 반응형 레이아웃
      7. JSON 기록 내보내기/가져오기
      8. 개인 초기 데이터 없이 빈 다이어리로 시작
      9. 작성 중 내용 자동 임시 저장 및 복원
      10. 기록 날짜를 표시하는 반응형 사이드바 달력
    -->

    <!-- 검색 영역: 데스크톱에서는 왼쪽 사이드바 -->
    <aside class="sidebar">
      <section class="card">
        <div class="calendar-section">
          <div class="calendar-header">
            <button id="prevMonthBtn" class="calendar-nav" aria-label="이전 달">‹</button>
            <h3 id="calendarTitle" class="calendar-title"></h3>
            <button id="nextMonthBtn" class="calendar-nav" aria-label="다음 달">›</button>
          </div>

          <div class="calendar-weekdays" aria-hidden="true">
            <span>일</span><span>월</span><span>화</span><span>수</span>
            <span>목</span><span>금</span><span>토</span>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>

          <div class="calendar-legend">
            <span class="legend-item">
              <span class="legend-dot legend-record"></span>기록 있음
            </span>
            <span class="legend-item">
              <span class="legend-dot legend-today"></span>오늘
            </span>
          </div>
        </div>

        <h2 class="card-title">🔍 기록 검색</h2>

        <div class="form-group">
          <label for="searchDate">📅 날짜 검색</label>
          <input type="date" id="searchDate" />
        </div>

        <div class="form-group">
          <label for="searchKeyword">💬 키워드 검색</label>
          <input
            type="text"
            id="searchKeyword"
            placeholder="학습 주제, 목표, 공부 내용 검색"
          />
        </div>

        <div class="button-group">
          <button id="searchBtn" class="primary-btn">🔍 검색</button>
          <button id="showAllBtn" class="secondary-btn">🗂️ 전체 기록 보기</button>
        </div>

        <p class="help-text">
          날짜와 키워드를 함께 입력하면 두 조건을 모두 만족하는 기록만 보여줍니다.
        </p>

        <div class="backup-section">
          <h3>💾 기록 백업</h3>

          <div class="button-group">
            <button id="exportBtn" class="secondary-btn">📤 기록 내보내기</button>
            <button id="importBtn" class="secondary-btn">📥 기록 가져오기</button>
          </div>

          <input
            type="file"
            id="importFile"
            class="file-input"
            accept=".json,application/json"
          />

          <p id="backupStatus" class="status-message"></p>
        </div>
      </section>
    </aside>



    <main class="main-content">
    <!-- 학습 기록 입력 영역 -->
    <section class="card">
      <h2 class="card-title">📝 학습 기록 작성</h2>

      <div id="editNotice" class="edit-notice">
        현재 기록을 수정하고 있습니다.
      </div>

      <div class="autosave-row" aria-live="polite">
        <span id="autosaveStatus" class="autosave-status">🌿 자동 저장 준비됨</span>
      </div>

      <div class="form-group">
        <label for="dateInput">🗓️ 날짜 <span class="required">*</span></label>
        <input type="date" id="dateInput" />
      </div>

      <div class="form-group">
        <label for="subjectInput">🔖 학습 주제 <span class="required">*</span></label>
        <input
          type="text"
          id="subjectInput"
          placeholder="예: JavaScript 배열 메서드 공부"
        />
      </div>

      <div class="form-group">
        <label for="goalsInput">🎯 오늘의 목표</label>
        <textarea id="goalsInput" placeholder="오늘 달성하고 싶은 목표를 적어보세요."></textarea>
      </div>

      <div class="form-group">
        <label for="studyInput">📖 오늘 공부한 내용</label>
        <textarea id="studyInput" placeholder="오늘 학습한 내용을 적어보세요."></textarea>
      </div>

      <div class="form-group">
        <label for="difficultyInput">🧩 어려웠던 점</label>
        <textarea id="difficultyInput" placeholder="공부하면서 어려웠던 부분을 적어보세요."></textarea>
      </div>

      <div class="form-group">
        <label for="learnedInput">💡 새롭게 배운 점</label>
        <textarea id="learnedInput" placeholder="새롭게 알게 된 내용을 적어보세요."></textarea>
      </div>

      <div class="form-group">
        <label for="nextPlanInput">🚀 다음 학습 계획</label>
        <textarea id="nextPlanInput" placeholder="다음에 공부할 내용을 적어보세요."></textarea>
      </div>

      <div class="button-group">
        <button id="saveBtn" class="primary-btn">💾 기록 저장</button>
        <button id="resetBtn" class="secondary-btn">🪄 입력 초기화</button>
        <button id="deleteAllBtn" class="danger-btn">🗑️ 전체 기록 삭제</button>
      </div>
    </section>

    <!-- 목록 화면 -->
    <section id="listView" class="card">
      <div class="list-header">
        <h2 class="card-title">🗂️ 나의 학습 기록</h2>
        <span id="resultCount" class="result-count"></span>
      </div>

      <div id="diaryList" class="diary-list"></div>
    </section>

    <!-- 상세 화면 -->
    <section id="detailView" class="card detail-view">
      <h2 id="detailTitle" class="detail-title">📖 기록 상세 보기</h2>
      <p id="detailDate" class="diary-date"></p>

      <div id="detailContent"></div>

      <div class="button-group">
        <button id="backBtn" class="secondary-btn">🕊️ 목록으로</button>
        <button id="editBtn" class="primary-btn">🖋️ 수정</button>
        <button id="deleteBtn" class="danger-btn">🗑️ 삭제</button>
      </div>
    </section>
    </main>
    </div>
  </div>

  <script>
    /* ============================================
       My Study Diary
       - 같은 날짜에 여러 기록 저장 가능
       - localStorage에 데이터 저장
       - 날짜와 키워드 검색
       - 검색어 주변 내용 미리보기
       - 상세 보기, 수정, 삭제 기능
    ============================================ */

    const STORAGE_KEY = "my_study_diary";
    const DRAFT_KEY = "my_study_diary_draft";

    const dateInput = document.getElementById("dateInput");
    const subjectInput = document.getElementById("subjectInput");
    const goalsInput = document.getElementById("goalsInput");
    const studyInput = document.getElementById("studyInput");
    const difficultyInput = document.getElementById("difficultyInput");
    const learnedInput = document.getElementById("learnedInput");
    const nextPlanInput = document.getElementById("nextPlanInput");

    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const deleteAllBtn = document.getElementById("deleteAllBtn");

    const searchDate = document.getElementById("searchDate");
    const searchKeyword = document.getElementById("searchKeyword");
    const searchBtn = document.getElementById("searchBtn");
    const showAllBtn = document.getElementById("showAllBtn");
    const exportBtn = document.getElementById("exportBtn");
    const importBtn = document.getElementById("importBtn");
    const importFile = document.getElementById("importFile");
    const backupStatus = document.getElementById("backupStatus");
    const autosaveStatus = document.getElementById("autosaveStatus");
    const calendarTitle = document.getElementById("calendarTitle");
    const calendarGrid = document.getElementById("calendarGrid");
    const prevMonthBtn = document.getElementById("prevMonthBtn");
    const nextMonthBtn = document.getElementById("nextMonthBtn");

    const diaryList = document.getElementById("diaryList");
    const resultCount = document.getElementById("resultCount");
    const listView = document.getElementById("listView");

    const detailView = document.getElementById("detailView");
    const detailTitle = document.getElementById("detailTitle");
    const detailDate = document.getElementById("detailDate");
    const detailContent = document.getElementById("detailContent");
    const backBtn = document.getElementById("backBtn");
    const editBtn = document.getElementById("editBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const editNotice = document.getElementById("editNotice");
    const todayCount = document.getElementById("todayCount");
    const totalCount = document.getElementById("totalCount");

    let records = loadRecords();
    let editingId = null;
    let selectedId = null;
    let autosaveTimer = null;
    let calendarDate = new Date();
    let selectedCalendarDate = "";

    // 페이지가 열리면 오늘 날짜를 자동 입력하고 전체 기록을 표시합니다.
    setToday();
    restoreDraft();
    updateStats();
    renderCalendar();
    renderRecords(records);

    // 상단 배너의 오늘 기록 수와 전체 기록 수를 갱신합니다.
    function updateStats() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      const todayText = `${year}-${month}-${day}`;

      const todayRecords = records.filter(record => record.date === todayText);
      todayCount.textContent = `☀️ 오늘의 기록 ${todayRecords.length}개`;
      totalCount.textContent = `🗂️ 전체 기록 ${records.length}개`;
    }


    // 작성 중인 입력값을 일정 시간 후 임시 저장합니다.
    const draftInputs = [
      dateInput,
      subjectInput,
      goalsInput,
      studyInput,
      difficultyInput,
      learnedInput,
      nextPlanInput
    ];

    draftInputs.forEach(function (input) {
      input.addEventListener("input", scheduleAutosave);
      input.addEventListener("change", scheduleAutosave);
    });

    function scheduleAutosave() {
      autosaveStatus.textContent = "… 저장 중";

      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(saveDraft, 500);
    }

    function saveDraft() {
      const draftData = {
        editingId: editingId,
        date: dateInput.value,
        subject: subjectInput.value,
        goals: goalsInput.value,
        studyContent: studyInput.value,
        difficulty: difficultyInput.value,
        learned: learnedInput.value,
        nextPlan: nextPlanInput.value,
        savedAt: new Date().toISOString()
      };

      const hasDraftContent =
        draftData.subject.trim() ||
        draftData.goals.trim() ||
        draftData.studyContent.trim() ||
        draftData.difficulty.trim() ||
        draftData.learned.trim() ||
        draftData.nextPlan.trim();

      if (!hasDraftContent) {
        localStorage.removeItem(DRAFT_KEY);
        autosaveStatus.textContent = "🌿 자동 저장 준비됨";
        return;
      }

      localStorage.setItem(DRAFT_KEY, JSON.stringify(draftData));

      const savedTime = new Date(draftData.savedAt).toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit"
      });

      autosaveStatus.textContent = `🌿 자동 저장됨 · ${savedTime}`;
    }

    function restoreDraft() {
      const savedDraft = localStorage.getItem(DRAFT_KEY);

      if (!savedDraft) {
        return;
      }

      try {
        const draft = JSON.parse(savedDraft);

        dateInput.value = draft.date || dateInput.value;
        subjectInput.value = draft.subject || "";
        goalsInput.value = draft.goals || "";
        studyInput.value = draft.studyContent || "";
        difficultyInput.value = draft.difficulty || "";
        learnedInput.value = draft.learned || "";
        nextPlanInput.value = draft.nextPlan || "";

        if (draft.editingId !== null && draft.editingId !== undefined) {
          const existingRecord = records.find(
            record => record.id === draft.editingId
          );

          if (existingRecord) {
            editingId = draft.editingId;
            saveBtn.textContent = "💾 수정 내용 저장";
            editNotice.style.display = "block";
          }
        }

        autosaveStatus.textContent = "🌱 작성 중이던 내용을 복원했습니다.";
      } catch (error) {
        console.error("임시 저장 내용을 복원하지 못했습니다.", error);
        localStorage.removeItem(DRAFT_KEY);
      }
    }

    function clearDraft() {
      clearTimeout(autosaveTimer);
      localStorage.removeItem(DRAFT_KEY);
      autosaveStatus.textContent = "🌿 자동 저장 준비됨";
    }

    // localStorage에서 기록을 불러옵니다.
    // 처음 실행한 브라우저에서는 빈 다이어리로 시작합니다.
    function loadRecords() {
      const savedData = localStorage.getItem(STORAGE_KEY);

      if (!savedData) {
        return [];
      }

      try {
        const parsedData = JSON.parse(savedData);
        return Array.isArray(parsedData) ? parsedData : [];
      } catch (error) {
        console.error("저장된 데이터를 불러오지 못했습니다.", error);
        return [];
      }
    }

    // 현재 기록 배열을 localStorage에 저장합니다.
    function saveRecordsToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // 오늘 날짜를 YYYY-MM-DD 형식으로 설정합니다.
    function setToday() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      dateInput.value = `${year}-${month}-${day}`;
    }

    // 입력 내용을 하나의 기록 객체로 만듭니다.
    function getFormData() {
      return {
        date: dateInput.value,
        subject: subjectInput.value.trim(),
        goals: goalsInput.value.trim(),
        studyContent: studyInput.value.trim(),
        difficulty: difficultyInput.value.trim(),
        learned: learnedInput.value.trim(),
        nextPlan: nextPlanInput.value.trim()
      };
    }

    // 저장 버튼
    saveBtn.addEventListener("click", function () {
      const formData = getFormData();

      if (!formData.date) {
        alert("날짜를 선택해 주세요.");
        dateInput.focus();
        return;
      }

      if (!formData.subject) {
        alert("학습 주제를 입력해 주세요.");
        subjectInput.focus();
        return;
      }

      const hasContent =
        formData.goals ||
        formData.studyContent ||
        formData.difficulty ||
        formData.learned ||
        formData.nextPlan;

      if (!hasContent) {
        alert("학습 내용 중 한 가지 이상을 입력해 주세요.");
        goalsInput.focus();
        return;
      }

      if (editingId !== null) {
        // 수정 중인 기록을 찾아 입력 내용으로 변경합니다.
        const recordIndex = records.findIndex(record => record.id === editingId);

        if (recordIndex !== -1) {
          records[recordIndex] = {
            ...records[recordIndex],
            ...formData,
            updatedAt: new Date().toISOString()
          };
        }

        alert("기록이 수정되었습니다.");
      } else {
        // Date.now()를 고유 ID로 사용하여 같은 날짜에도 여러 기록을 저장합니다.
        const newRecord = {
          id: Date.now(),
          ...formData,
          createdAt: new Date().toISOString(),
          updatedAt: null
        };

        records.push(newRecord);
        alert("학습 기록이 저장되었습니다.");
      }

      saveRecordsToStorage();
      updateStats();
      renderCalendar();
      clearDraft();
      resetForm();
      renderRecords(records);
      showListView();
    });

    // 입력 초기화 버튼
    resetBtn.addEventListener("click", function () {
      clearDraft();
      resetForm();
    });

    // 입력 폼을 초기 상태로 되돌립니다.
    function resetForm() {
      editingId = null;
      subjectInput.value = "";
      goalsInput.value = "";
      studyInput.value = "";
      difficultyInput.value = "";
      learnedInput.value = "";
      nextPlanInput.value = "";
      saveBtn.textContent = "💾 기록 저장";
      editNotice.style.display = "none";
      setToday();
    }

    // 전체 기록 삭제
    deleteAllBtn.addEventListener("click", function () {
      if (records.length === 0) {
        alert("삭제할 기록이 없습니다.");
        return;
      }

      const isConfirmed = confirm(
        "저장된 모든 학습 기록을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다."
      );

      if (!isConfirmed) {
        return;
      }

      records = [];
      saveRecordsToStorage();
      updateStats();
      renderCalendar();
      clearDraft();
      resetForm();
      clearSearch();
      renderRecords(records);
      showListView();
      alert("전체 기록이 삭제되었습니다.");
    });


    // 사이드바 월간 달력을 그립니다.
    function renderCalendar() {
      calendarGrid.innerHTML = "";

      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();
      calendarTitle.textContent = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = firstDay.getDay();
      const totalDays = lastDay.getDate();

      const previousMonthLastDay = new Date(year, month, 0).getDate();
      const todayText = toDateText(new Date());

      const recordDateSet = new Set(
        records.map(record => record.date)
      );

      const totalCells = Math.ceil((startWeekday + totalDays) / 7) * 7;

      for (let index = 0; index < totalCells; index++) {
        const dayButton = document.createElement("button");
        dayButton.type = "button";
        dayButton.className = "calendar-day";

        let cellDate;
        let dayNumber;

        if (index < startWeekday) {
          dayNumber = previousMonthLastDay - startWeekday + index + 1;
          cellDate = new Date(year, month - 1, dayNumber);
          dayButton.classList.add("other-month");
        } else if (index >= startWeekday + totalDays) {
          dayNumber = index - (startWeekday + totalDays) + 1;
          cellDate = new Date(year, month + 1, dayNumber);
          dayButton.classList.add("other-month");
        } else {
          dayNumber = index - startWeekday + 1;
          cellDate = new Date(year, month, dayNumber);
        }

        const dateText = toDateText(cellDate);
        dayButton.textContent = dayNumber;
        dayButton.setAttribute("aria-label", `${dateText} 기록 검색`);

        if (recordDateSet.has(dateText)) {
          dayButton.classList.add("has-record");
        }

        if (dateText === todayText) {
          dayButton.classList.add("today");
        }

        if (dateText === selectedCalendarDate) {
          dayButton.classList.add("selected");
        }

        dayButton.addEventListener("click", function () {
          selectedCalendarDate = dateText;
          searchDate.value = dateText;

          calendarDate = new Date(
            cellDate.getFullYear(),
            cellDate.getMonth(),
            1
          );

          renderCalendar();
          searchBtn.click();

          // 달력에서 날짜를 선택하면 검색 결과가 있는 학습 기록 목록으로 이동합니다.
          listView.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        });

        calendarGrid.appendChild(dayButton);
      }
    }

    prevMonthBtn.addEventListener("click", function () {
      calendarDate = new Date(
        calendarDate.getFullYear(),
        calendarDate.getMonth() - 1,
        1
      );
      renderCalendar();
    });

    nextMonthBtn.addEventListener("click", function () {
      calendarDate = new Date(
        calendarDate.getFullYear(),
        calendarDate.getMonth() + 1,
        1
      );
      renderCalendar();
    });

    function toDateText(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    // 검색 버튼
    searchBtn.addEventListener("click", function () {
      const dateValue = searchDate.value;
      const keywordValue = searchKeyword.value.trim().toLowerCase();

      selectedCalendarDate = dateValue;
      if (dateValue) {
        const [year, month] = dateValue.split("-").map(Number);
        calendarDate = new Date(year, month - 1, 1);
      }
      renderCalendar();

      const filteredRecords = records.filter(function (record) {
        const matchesDate = !dateValue || record.date === dateValue;

        const allText = [
          record.subject,
          record.goals,
          record.studyContent,
          record.difficulty,
          record.learned,
          record.nextPlan
        ]
          .join(" ")
          .toLowerCase();

        const matchesKeyword =
          !keywordValue || allText.includes(keywordValue);

        return matchesDate && matchesKeyword;
      });

      renderRecords(filteredRecords, keywordValue);
      showListView();
    });

    // 현재 기록을 JSON 백업 파일로 내보냅니다.
    exportBtn.addEventListener("click", function () {
      if (records.length === 0) {
        alert("내보낼 기록이 없습니다.");
        return;
      }

      const jsonText = JSON.stringify(records, null, 2);
      const blob = new Blob([jsonText], { type: "application/json" });
      const downloadUrl = URL.createObjectURL(blob);

      const today = new Date();
      const dateText = [
        today.getFullYear(),
        String(today.getMonth() + 1).padStart(2, "0"),
        String(today.getDate()).padStart(2, "0")
      ].join("-");

      const link = document.createElement("a");
      link.href = downloadUrl;
      link.download = `my_study_diary_backup_${dateText}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(downloadUrl);

      showBackupStatus(`기록 ${records.length}개를 JSON 파일로 내보냈습니다.`);
    });

    // 가져오기 버튼을 누르면 숨겨진 파일 선택창을 엽니다.
    importBtn.addEventListener("click", function () {
      importFile.value = "";
      importFile.click();
    });

    // JSON 백업 파일을 읽어 기존 기록과 합치거나 덮어씁니다.
    importFile.addEventListener("change", function (event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        try {
          const importedData = JSON.parse(reader.result);

          if (!Array.isArray(importedData)) {
            throw new Error("기록 배열 형식이 아닙니다.");
          }

          const validRecords = importedData.filter(isValidRecord);

          if (validRecords.length === 0) {
            throw new Error("가져올 수 있는 올바른 기록이 없습니다.");
          }

          const shouldMerge = confirm(
            `백업 파일에서 ${validRecords.length}개의 기록을 찾았습니다.\n\n` +
            "확인: 현재 기록과 합치기\n취소: 현재 기록을 백업 파일로 덮어쓰기"
          );

          if (shouldMerge) {
            records = mergeRecords(records, validRecords);
          } else {
            const shouldOverwrite = confirm(
              "현재 저장된 기록을 모두 지우고 백업 파일의 기록으로 교체하시겠습니까?"
            );

            if (!shouldOverwrite) {
              showBackupStatus("기록 가져오기를 취소했습니다.");
              return;
            }

            records = validRecords;
          }

          saveRecordsToStorage();
          updateStats();
          renderCalendar();
          showAllRecords();
          showBackupStatus(`기록 가져오기가 완료되었습니다. 현재 총 ${records.length}개입니다.`);
        } catch (error) {
          console.error(error);
          alert("올바른 My Study Diary JSON 백업 파일이 아닙니다.");
          showBackupStatus("기록 가져오기에 실패했습니다.");
        }
      };

      reader.onerror = function () {
        alert("파일을 읽는 중 오류가 발생했습니다.");
        showBackupStatus("파일을 읽지 못했습니다.");
      };

      reader.readAsText(file, "UTF-8");
    });

    // 가져온 데이터가 다이어리 기록 형식인지 기본 항목을 확인합니다.
    function isValidRecord(record) {
      return (
        record &&
        typeof record === "object" &&
        typeof record.date === "string" &&
        typeof record.subject === "string"
      );
    }

    // 같은 ID의 기록은 중복되지 않도록 합칩니다.
    function mergeRecords(currentRecords, importedRecords) {
      const recordMap = new Map();

      currentRecords.forEach(function (record) {
        recordMap.set(String(record.id), record);
      });

      importedRecords.forEach(function (record) {
        const recordId = record.id ?? `${record.date}-${record.subject}-${Date.now()}-${Math.random()}`;
        recordMap.set(String(recordId), {
          id: record.id ?? Date.now() + Math.floor(Math.random() * 100000),
          date: record.date,
          subject: record.subject,
          goals: record.goals || "",
          studyContent: record.studyContent || "",
          difficulty: record.difficulty || "",
          learned: record.learned || "",
          nextPlan: record.nextPlan || "",
          createdAt: record.createdAt || new Date().toISOString(),
          updatedAt: record.updatedAt || null
        });
      });

      return Array.from(recordMap.values());
    }

    function showBackupStatus(message) {
      backupStatus.textContent = message;
      backupStatus.style.display = "block";
    }

    // 검색창에서 Enter를 눌러도 검색할 수 있습니다.
    searchKeyword.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        searchBtn.click();
      }
    });

    // 전체 기록 보기
    showAllBtn.addEventListener("click", showAllRecords);

    // 검색 조건을 완전히 초기화하고 전체 기록을 다시 표시합니다.
    function showAllRecords() {
      clearSearch();
      selectedCalendarDate = "";
      renderCalendar();
      selectedId = null;
      showListView();
      renderRecords(records);
      resultCount.textContent = `총 ${records.length}개의 기록`;

      listView.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function clearSearch() {
      searchDate.value = "";
      searchKeyword.value = "";
    }

    // 기록을 날짜 최신순, 같은 날짜에서는 작성 시간 최신순으로 정렬합니다.
    function sortRecords(recordList) {
      return [...recordList].sort(function (a, b) {
        if (a.date !== b.date) {
          return b.date.localeCompare(a.date);
        }

        return new Date(b.createdAt) - new Date(a.createdAt);
      });
    }

    // 목록을 날짜별 그룹으로 나누어 화면에 표시합니다.
    function renderRecords(recordList, keyword = "") {
      diaryList.innerHTML = "";

      const sortedRecords = sortRecords(recordList);
      resultCount.textContent = `총 ${sortedRecords.length}개의 기록`;

      if (sortedRecords.length === 0) {
        const isSearching = searchDate.value || searchKeyword.value.trim();
        diaryList.innerHTML = isSearching
          ? '<div class="empty-message"><span class="empty-icon">🔍</span><strong>검색 결과가 없습니다.</strong><br>다른 날짜나 키워드로 다시 검색해 보세요.</div>'
          : '<div class="empty-message"><span class="empty-icon">🪶</span><strong>아직 작성된 학습 기록이 없습니다.</strong><br>오늘 공부한 내용을 첫 기록으로 남겨보세요.</div>';
        return;
      }

      // 날짜를 기준으로 기록을 묶습니다.
      const groupedRecords = {};

      sortedRecords.forEach(function (record) {
        if (!groupedRecords[record.date]) {
          groupedRecords[record.date] = [];
        }
        groupedRecords[record.date].push(record);
      });

      Object.keys(groupedRecords).forEach(function (date) {
        const dateGroup = document.createElement("section");
        dateGroup.className = "date-group";

        const groupHeader = document.createElement("div");
        groupHeader.className = "date-group-header";

        const groupTitle = document.createElement("span");
        groupTitle.textContent = `📅 ${formatDate(date)}`;

        const groupCount = document.createElement("span");
        groupCount.className = "date-group-count";
        groupCount.textContent = `${groupedRecords[date].length}개의 학습 기록`;

        groupHeader.appendChild(groupTitle);
        groupHeader.appendChild(groupCount);
        dateGroup.appendChild(groupHeader);

        groupedRecords[date].forEach(function (record) {
          const item = document.createElement("article");
          item.className = "diary-item";

          const topArea = document.createElement("div");
          topArea.className = "diary-item-top";

          const titleArea = document.createElement("div");

          const dateElement = document.createElement("div");
          dateElement.className = "diary-date";
          dateElement.textContent = `⏰ ${formatTime(record.createdAt)} 작성`;

          const titleElement = document.createElement("h3");
          titleElement.className = "diary-title";

          if (keyword) {
            titleElement.innerHTML = highlightKeyword(record.subject, keyword);
          } else {
            titleElement.textContent = record.subject;
          }

          titleArea.appendChild(dateElement);
          titleArea.appendChild(titleElement);

          const viewButton = document.createElement("button");
          viewButton.className = "primary-btn small-btn";
          viewButton.textContent = "📖 기록 보기";
          viewButton.addEventListener("click", function () {
            showDetail(record.id);
          });

          topArea.appendChild(titleArea);
          topArea.appendChild(viewButton);
          item.appendChild(topArea);

          // 일반 목록에서는 오늘의 목표를 짧게 미리 보여줍니다.
          if (!keyword && record.goals) {
            const goalSnippet = document.createElement("p");
            goalSnippet.className = "goal-snippet";
            goalSnippet.textContent =
              "🎯 " +
              (record.goals.length > 90
                ? record.goals.slice(0, 90) + "…"
                : record.goals);
            item.appendChild(goalSnippet);
          }

          // 키워드 검색 중이면 검색어가 포함된 부분을 미리 보여줍니다.
          if (keyword) {
            const previews = createMatchingPreviews(record, keyword);

            previews.forEach(function (preview) {
              const previewElement = document.createElement("div");
              previewElement.className = "preview-block";
              previewElement.innerHTML =
                `<span class="preview-label">${escapeHtml(preview.label)}</span>` +
                highlightKeyword(preview.text, keyword);

              item.appendChild(previewElement);
            });
          }

          dateGroup.appendChild(item);
        });

        diaryList.appendChild(dateGroup);
      });
    }

    // 검색어가 포함된 입력 항목을 찾아 최대 3개까지 미리보기로 만듭니다.
    function createMatchingPreviews(record, keyword) {
      const fields = [
        { label: "학습 주제", text: record.subject },
        { label: "오늘의 목표", text: record.goals },
        { label: "오늘 공부한 내용", text: record.studyContent },
        { label: "어려웠던 점", text: record.difficulty },
        { label: "새롭게 배운 점", text: record.learned },
        { label: "다음 학습 계획", text: record.nextPlan }
      ];

      return fields
        .filter(function (field) {
          return field.text.toLowerCase().includes(keyword);
        })
        .slice(0, 3)
        .map(function (field) {
          return {
            label: field.label,
            text: createSearchPreview(field.text, keyword)
          };
        });
    }

    // 검색어가 나온 위치를 기준으로 앞뒤 약 55글자를 보여줍니다.
    function createSearchPreview(text, keyword) {
      const lowerText = text.toLowerCase();
      const index = lowerText.indexOf(keyword);

      if (index === -1) {
        return "";
      }

      const range = 55;
      const start = Math.max(0, index - range);
      const end = Math.min(text.length, index + keyword.length + range);

      const front = start > 0 ? "…" : "";
      const back = end < text.length ? "…" : "";

      return front + text.slice(start, end) + back;
    }

    // 상세 화면을 표시합니다.
    function showDetail(id) {
      const record = records.find(function (item) {
        return item.id === id;
      });

      if (!record) {
        alert("기록을 찾을 수 없습니다.");
        return;
      }

      selectedId = id;
      detailTitle.textContent = record.subject;
      detailDate.textContent =
        formatDate(record.date) + " · 작성 " + formatTime(record.createdAt);

      const detailFields = [
        ["🎯 오늘의 목표", record.goals],
        ["📖 오늘 공부한 내용", record.studyContent],
        ["🧩 어려웠던 점", record.difficulty],
        ["💡 새롭게 배운 점", record.learned],
        ["🚀 다음 학습 계획", record.nextPlan]
      ];

      detailContent.innerHTML = "";

      detailFields.forEach(function (field) {
        const row = document.createElement("div");
        row.className = "detail-row";

        const heading = document.createElement("h3");
        heading.textContent = field[0];

        const paragraph = document.createElement("p");
        paragraph.textContent = field[1] || "작성하지 않았어요.";

        row.appendChild(heading);
        row.appendChild(paragraph);
        detailContent.appendChild(row);
      });

      listView.style.display = "none";
      detailView.style.display = "block";
      detailView.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    backBtn.addEventListener("click", function () {
      showListView();
    });

    // 상세 화면의 기록을 입력 폼으로 불러와 수정합니다.
    editBtn.addEventListener("click", function () {
      const record = records.find(function (item) {
        return item.id === selectedId;
      });

      if (!record) {
        alert("수정할 기록을 찾을 수 없습니다.");
        return;
      }

      editingId = record.id;
      dateInput.value = record.date;
      subjectInput.value = record.subject;
      goalsInput.value = record.goals;
      studyInput.value = record.studyContent;
      difficultyInput.value = record.difficulty;
      learnedInput.value = record.learned;
      nextPlanInput.value = record.nextPlan;

      saveBtn.textContent = "💾 수정 내용 저장";
      editNotice.style.display = "block";
      saveDraft();
      showListView();

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });

    // 선택한 기록 하나만 삭제합니다.
    deleteBtn.addEventListener("click", function () {
      const record = records.find(function (item) {
        return item.id === selectedId;
      });

      if (!record) {
        alert("삭제할 기록을 찾을 수 없습니다.");
        return;
      }

      const isConfirmed = confirm(
        `"${record.subject}" 기록을 삭제하시겠습니까?`
      );

      if (!isConfirmed) {
        return;
      }

      records = records.filter(function (item) {
        return item.id !== selectedId;
      });

      saveRecordsToStorage();
      updateStats();
      renderCalendar();
      selectedId = null;
      renderRecords(records);
      showListView();
      alert("기록이 삭제되었습니다.");
    });

    function showListView() {
      listView.style.display = "block";
      detailView.style.display = "none";
    }

    // 2026-07-17 형식의 날짜를 보기 편하게 변경합니다.
    function formatDate(dateText) {
      if (!dateText) {
        return "";
      }

      const parts = dateText.split("-");
      return `${parts[0]}년 ${Number(parts[1])}월 ${Number(parts[2])}일`;
    }

    // 작성 시간을 시:분 형태로 표시합니다.
    function formatTime(dateTimeText) {
      const date = new Date(dateTimeText);

      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return date.toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    // 사용자가 입력한 HTML 태그가 실행되지 않도록 안전하게 변환합니다.
    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // 검색어를 안전하게 강조합니다.
    function highlightKeyword(text, keyword) {
      const safeText = escapeHtml(text);
      const safeKeyword = escapeHtml(keyword);

      if (!safeKeyword) {
        return safeText;
      }

      const escapedForRegex = safeKeyword.replace(
        /[.*+?^${}()|[\]\\]/g,
        "\\$&"
      );

      const regex = new RegExp(`(${escapedForRegex})`, "gi");
      return safeText.replace(regex, "<mark>$1</mark>");
    }
  </script>
